name: Update Grouped Credly Badge Images

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate grouped Credly badge images
        env:
          CREDLY_USERNAME: chandrakanth-mullella
        run: |
          python <<'PY'
          import json
          import os
          import re
          import requests

          username = os.environ["CREDLY_USERNAME"]
          readme_file = "README.md"
          profile_url = f"https://www.credly.com/users/{username}"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          def normalize(text):
              return re.sub(r"\s+", " ", text).strip()

          def bucket(name):
              n = name.lower()
              if "aws" in n:
                  return "AWS Certifications"
              if any(x in n for x in ["cka", "ckad", "kcna", "kubernetes", "cloud native", "gitops"]):
                  return "Kubernetes & Cloud Native"
              if "terraform" in n or "hashicorp" in n:
                  return "HashiCorp Certifications"
              if any(x in n for x in ["python", "pcep", "machine learning"]):
                  return "Programming & ML"
              if any(x in n for x in ["linux", "lpi"]):
                  return "Linux Certifications"
              return "Other Certifications"

          def get_badges_from_profile():
              resp = requests.get(profile_url, headers=headers, timeout=30)
              resp.raise_for_status()
              html = resp.text

              m = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.+?)</script>', html, re.S)
              if not m:
                  raise RuntimeError("Could not find __NEXT_DATA__ in Credly profile page.")

              data = json.loads(m.group(1))

              def walk(obj):
                  if isinstance(obj, dict):
                      yield obj
                      for v in obj.values():
                          yield from walk(v)
                  elif isinstance(obj, list):
                      for item in obj:
                          yield from walk(item)

              found = []
              for obj in walk(data):
                  if not isinstance(obj, dict):
                      continue

                  url = obj.get("url") or obj.get("public_url")
                  title = obj.get("title") or obj.get("name")
                  image = (
                      obj.get("image_url")
                      or obj.get("image")
                      or obj.get("badge_image_url")
                      or obj.get("badge_image")
                  )

                  if not url or not title:
                      continue

                  if "/badges/" not in str(url):
                      continue

                  found.append({
                      "name": normalize(str(title)),
                      "url": str(url),
                      "image": str(image) if image else None
                  })

              unique = {}
              for item in found:
                  key = item["url"]
                  if key not in unique:
                      unique[key] = item

              badges = list(unique.values())

              if not badges:
                  raise RuntimeError("No public badges found on Credly profile.")

              return badges

          def enrich_badge_image(badge):
              if badge.get("image"):
                  return badge

              try:
                  r = requests.get(badge["url"], headers=headers, timeout=30)
                  r.raise_for_status()
                  html = r.text

                  og = re.search(r'<meta[^>]+property="og:image"[^>]+content="([^"]+)"', html, re.I)
                  if og:
                      badge["image"] = og.group(1)
              except Exception:
                  pass

              return badge

          badges = get_badges_from_profile()
          badges = [enrich_badge_image(b) for b in badges]

          dedup_by_name = {}
          for badge in badges:
              dedup_by_name[badge["name"]] = badge

          badges = sorted(dedup_by_name.values(), key=lambda x: x["name"].lower())

          grouped = {}
          for badge in badges:
              section = bucket(badge["name"])
              grouped.setdefault(section, []).append(badge)

          section_order = [
              "AWS Certifications",
              "Kubernetes & Cloud Native",
              "HashiCorp Certifications",
              "Programming & ML",
              "Linux Certifications",
              "Other Certifications",
          ]

          lines = []
          lines.append("## 🏅 Certifications & Badges")
          lines.append("")
          lines.append("Showcase of my verified professional certifications and digital badges.")
          lines.append("")
          lines.append(f"[Credly Profile](https://www.credly.com/users/{username})")
          lines.append("")

          for section in section_order:
              items = grouped.get(section, [])
              if not items:
                  continue

              lines.append(f"### {section}")
              lines.append("")

              row = []
              for badge in items:
                  image = badge.get("image")
                  if image:
                      cell = (
                          f'<a href="{badge["url"]}" target="_blank" rel="noopener noreferrer">'
                          f'<img src="{image}" alt="{badge["name"]}" width="110" height="110" style="margin: 6px;" /></a>'
                      )
                  else:
                      cell = f'[{badge["name"]}]({badge["url"]})'
                  row.append(cell)

              lines.append('<p align="left">')
              lines.append("  " + "\n  ".join(row))
              lines.append('</p>')
              lines.append("")

          generated = "\n".join(lines).rstrip() + "\n"

          start_marker = "<!-- CREDLY_BADGES:START -->"
          end_marker = "<!-- CREDLY_BADGES:END -->"

          with open(readme_file, "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = re.compile(re.escape(start_marker) + r".*?" + re.escape(end_marker), re.S)
          replacement = f"{start_marker}\n{generated}{end_marker}"

          if pattern.search(readme):
              updated = pattern.sub(replacement, readme)
          else:
              updated = readme.rstrip() + "\n\n" + replacement + "\n"

          with open(readme_file, "w", encoding="utf-8") as f:
              f.write(updated)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update grouped Credly badge images"
          git push