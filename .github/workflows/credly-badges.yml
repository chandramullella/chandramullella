name: Update Grouped Credly Badge Images

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate grouped Credly badge images
        env:
          CREDLY_USERNAME: chandrakanth-mullella
        run: |
          python <<'PY'
          import os
          import re
          import html
          import requests
          from bs4 import BeautifulSoup

          username = os.environ["CREDLY_USERNAME"]
          readme_file = "README.md"
          badges_url = f"https://www.credly.com/users/{username}/badges"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          def normalize(text):
              return re.sub(r"\s+", " ", html.unescape(text or "")).strip()

          def bucket(name):
              n = name.lower()
              if "aws" in n:
                  return "AWS Certifications"
              if any(x in n for x in ["cka", "ckad", "kcna", "kubernetes", "cloud native", "gitops"]):
                  return "Kubernetes & Cloud Native"
              if "terraform" in n or "hashicorp" in n:
                  return "HashiCorp Certifications"
              if any(x in n for x in ["python", "pcep", "machine learning"]):
                  return "Programming & ML"
              if any(x in n for x in ["linux", "lpi"]):
                  return "Linux Certifications"
              return "Other Certifications"

          def get_badge_links():
              resp = requests.get(badges_url, headers=headers, timeout=30)
              resp.raise_for_status()
              soup = BeautifulSoup(resp.text, "html.parser")

              links = set()

              for a in soup.find_all("a", href=True):
                  href = a["href"].strip()
                  if re.search(r"^/badges/[a-f0-9\\-]+$", href, re.I):
                      links.add("https://www.credly.com" + href)
                  elif re.search(r"^https://www\\.credly\\.com/badges/[a-f0-9\\-]+$", href, re.I):
                      links.add(href)

              if not links:
                  html_text = resp.text
                  links.update(re.findall(r'https://www\\.credly\\.com/badges/[a-f0-9\\-]+', html_text, re.I))
                  links.update("https://www.credly.com" + m for m in re.findall(r'"/badges/[a-f0-9\\-]+"', html_text, re.I))

              cleaned = set()
              for link in links:
                  link = link.strip('"')
                  cleaned.add(link)

              if not cleaned:
                  raise RuntimeError("No badge links found on the public Credly badges page.")

              return sorted(cleaned)

          def parse_badge_page(url):
              resp = requests.get(url, headers=headers, timeout=30)
              resp.raise_for_status()
              soup = BeautifulSoup(resp.text, "html.parser")

              name = None
              image = None

              og_title = soup.find("meta", attrs={"property": "og:title"})
              if og_title and og_title.get("content"):
                  name = normalize(og_title["content"]).split("|")[0].strip()

              if not name and soup.title and soup.title.text:
                  name = normalize(soup.title.text).split("|")[0].strip()

              if not name:
                  h1 = soup.find("h1")
                  if h1:
                      name = normalize(h1.get_text(" ", strip=True))

              og_image = soup.find("meta", attrs={"property": "og:image"})
              if og_image and og_image.get("content"):
                  image = og_image["content"].strip()

              if not name:
                  return None

              return {
                  "name": name,
                  "url": url,
                  "image": image
              }

          badge_links = get_badge_links()

          badges = []
          for link in badge_links:
              try:
                  parsed = parse_badge_page(link)
                  if parsed:
                      badges.append(parsed)
              except Exception:
                  pass

          if not badges:
              raise RuntimeError("Badge links were found, but no badge pages could be parsed.")

          dedup = {}
          for badge in badges:
              dedup[badge["name"]] = badge

          badges = sorted(dedup.values(), key=lambda x: x["name"].lower())

          grouped = {}
          for badge in badges:
              section = bucket(badge["name"])
              grouped.setdefault(section, []).append(badge)

          section_order = [
              "AWS Certifications",
              "Kubernetes & Cloud Native",
              "HashiCorp Certifications",
              "Programming & ML",
              "Linux Certifications",
              "Other Certifications",
          ]

          lines = []
          lines.append("## 🏅 Certifications & Badges")
          lines.append("")
          lines.append("Showcase of my verified professional certifications and digital badges.")
          lines.append("")
          lines.append(f"[Credly Profile](https://www.credly.com/users/{username}/badges)")
          lines.append("")

          for section in section_order:
              items = grouped.get(section, [])
              if not items:
                  continue

              lines.append(f"### {section}")
              lines.append("")
              lines.append('<p align="left">')

              for badge in items:
                  if badge.get("image"):
                      lines.append(
                          f'  <a href="{badge["url"]}" target="_blank" rel="noopener noreferrer">'
                          f'<img src="{badge["image"]}" alt="{badge["name"]}" width="110" height="110" style="margin: 6px;" /></a>'
                      )
                  else:
                      lines.append(f'  <a href="{badge["url"]}" target="_blank" rel="noopener noreferrer">{badge["name"]}</a>')

              lines.append("</p>")
              lines.append("")

          generated = "\n".join(lines).rstrip() + "\n"

          start_marker = "<!-- CREDLY_BADGES:START -->"
          end_marker = "<!-- CREDLY_BADGES:END -->"

          with open(readme_file, "r", encoding="utf-8") as f:
              readme = f.read()

          block = f"{start_marker}\n{generated}{end_marker}"

          pattern = re.compile(re.escape(start_marker) + r".*?" + re.escape(end_marker), re.S)
          if pattern.search(readme):
              updated = pattern.sub(block, readme)
          else:
              updated = readme.rstrip() + "\n\n" + block + "\n"

          with open(readme_file, "w", encoding="utf-8") as f:
              f.write(updated)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update grouped Credly badge images"
          git push